name: Update Daily IT News

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  # Run every day at 18:00 UTC (= 00:30 MMT the following calendar day, UTC+6:30)
  schedule:
    - cron: "0 18 * * *"

  # Allow manual run from the Actions tab (useful for testing)
  workflow_dispatch:

# ── Permissions ───────────────────────────────────────────────────────────────
permissions:
  contents: write   # needed to commit index.html back to the repo

# ── Jobs ──────────────────────────────────────────────────────────────────────
jobs:
  update-news:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # 1. Check out the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Cache pip dependencies for faster runs
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 4. Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 5. (Optional) expose API key if you use one.
      #    Store it as a repository secret named NEWS_API_KEY.
      #    Uncomment the env block below and the relevant code in fetch_news.py.
      # - name: Fetch news
      #   env:
      #     NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
      #   run: python src/fetch_news.py

      # 5. Run the news fetcher (RSS-only, no secret needed)
      - name: Fetch and render news
        run: python fetch_news.py

      # 6. Commit and push the updated index.html
      - name: Commit updated index.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          # Only commit if the file actually changed
          if git diff --cached --quiet; then
            echo "No changes to index.html — skipping commit."
          else
            git commit -m "chore: update news $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
