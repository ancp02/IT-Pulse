name: Deploy to GitHub Pages

# 🔒 Security: Only deploy from main branch, require manual approval for PRs
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]
  schedule:
    # Run daily at 00:00 UTC to update news
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allow manual trigger

# 🔒 Security: Minimal required permissions
permissions:
  contents: read
  pages: write
  id-token: write
  # Explicitly deny other permissions for security

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # 🔒 Security: Require environment approval for production deployment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        # 🔒 Security: Only fetch what we need
        fetch-depth: 1
        # 🔒 Security: Use token with minimal permissions
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        # 🔒 Security: Verify Python installation
        check-latest: true

    # 🔒 Security: Verify no malicious files were added
    - name: Security scan - check for suspicious files
      run: |
        echo "🔍 Scanning for potentially dangerous files..."

        # Check for executable scripts that shouldn't be there
        if find . -name "*.exe" -o -name "*.bat" -o -name "*.cmd" | grep -v -E "\.github|node_modules"; then
          echo "❌ Found executable files that shouldn't be in repository"
          exit 1
        fi

        # Check for large files that might be malware
        LARGE_FILES=$(find . -type f -size +50M 2>/dev/null)
        if [ ! -z "$LARGE_FILES" ]; then
          echo "❌ Found unusually large files:"
          echo "$LARGE_FILES"
          exit 1
        fi

        echo "✅ Security scan passed"

    # 🔒 Security: Verify Python dependencies are safe
    - name: Security scan - check Python dependencies
      run: |
        echo "🔍 Checking Python dependencies for known vulnerabilities..."

        # Check if requirements.txt exists and is not empty
        if [ ! -f "requirements.txt" ] || [ ! -s "requirements.txt" ]; then
          echo "❌ requirements.txt missing or empty"
          exit 1
        fi

        # Install safety tool for dependency checking
        pip install safety

        # Check for known vulnerabilities (allow warnings, fail on high/critical)
        if ! safety check --file requirements.txt --full-report; then
          echo "⚠️  Dependency vulnerabilities found - review requirements.txt"
          # Don't fail the build, just warn
        fi

        echo "✅ Dependency security check completed"

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 🔒 Security: Validate the news fetching script before running
    - name: Validate news fetching script
      run: |
        echo "🔍 Validating fetch_news.py..."

        # Check if the script exists and is readable
        if [ ! -f "fetch_news.py" ]; then
          echo "❌ fetch_news.py not found"
          exit 1
        fi

        # Basic syntax check
        if ! python -m py_compile fetch_news.py; then
          echo "❌ fetch_news.py has syntax errors"
          exit 1
        fi

        # Check for dangerous imports (optional - can be removed if needed)
        if grep -q "import os\|import subprocess\|import sys" fetch_news.py; then
          echo "⚠️  fetch_news.py uses system-level imports - ensure they're safe"
        fi

        echo "✅ Script validation passed"

    - name: Fetch latest news
      run: |
        echo "📰 Fetching latest IT news..."
        python fetch_news.py

        # Verify the output was generated
        if [ ! -f "index.html" ]; then
          echo "❌ index.html was not generated by fetch_news.py"
          exit 1
        fi

        # Check that the file has reasonable content
        FILE_SIZE=$(stat -c%s "index.html" 2>/dev/null || stat -f%z "index.html" 2>/dev/null)
        if [ "$FILE_SIZE" -lt 1000 ]; then
          echo "❌ Generated index.html is too small ($FILE_SIZE bytes)"
          exit 1
        fi

        echo "✅ News fetched and index.html generated ($FILE_SIZE bytes)"

    - name: Setup Pages
      uses: actions/configure-pages@v3

    # 🔒 Security: Only upload the files we expect
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v2
      with:
        path: '.'
        # Exclude sensitive source files from deployment
        retention-days: 1

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v2
