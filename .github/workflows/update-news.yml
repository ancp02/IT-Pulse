name: Update Daily IT News

on:
  schedule:
    # 18:30 UTC = 01:00 MMT next day
    - cron: "30 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-news
  cancel-in-progress: false

jobs:
  update-news:
    name: Fetch feeds and refresh index
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate and generate index
        run: |
          python -m py_compile fetch_news.py
          python fetch_news.py

          test -f index.html
          grep -q "<!DOCTYPE html>" index.html

      - name: Commit and push if changed
        run: |
          changed_files=$(git status --porcelain | awk '{print $2}')

          if [ -z "$changed_files" ]; then
            echo "No repository changes detected."
            exit 0
          fi

          unexpected=$(printf "%s\n" "$changed_files" | grep -v '^index.html$' || true)
          if [ -n "$unexpected" ]; then
            echo "Unexpected file changes detected:"
            printf "%s\n" "$unexpected"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add index.html
          if git diff --cached --quiet; then
            echo "index.html did not change."
            exit 0
          fi

          git commit -m "chore: auto-refresh IT Pulse feed"
          git push
